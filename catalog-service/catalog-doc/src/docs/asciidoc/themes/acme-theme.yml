extends: default

base:
  font_color: #2C3E50
  font_size: 10.5
  line_height: 1.5

page:
  background_color: #FFFFFF
  layout: portrait
  margin: [20mm, 20mm, 20mm, 20mm]
  size: A4

heading:
  font_color: #1A5276
  font_style: bold
  h1_font_size: 26
  h2_font_size: 20
  h3_font_size: 16
  h4_font_size: 13
  h5_font_size: 11
  h6_font_size: 10.5
  margin_top: 6
  margin_bottom: 4

title_page:
  background_color: #1A5276
  font_color: #FFFFFF
  title:
    font_size: 32
    font_style: bold
    font_color: #FFFFFF
    margin_top: 140
  subtitle:
    font_size: 20
    font_color: #AED6F1
  authors:
    font_size: 13
    font_color: #D6EAF8
    margin_top: 16
  revision:
    font_size: 10
    font_color: #85C1E9
    margin_top: 4

link:
  font_color: #1A5276

code:
  font_size: 9
  background_color: #F2F3F4
  border_color: #D5D8DC
  border_radius: 3
  padding: [3, 6, 3, 6]

codespan:
  font_size: 9
  background_color: #F2F3F4
  border_color: #D5D8DC
  border_radius: 2
  padding: [1, 3, 1, 3]

admonition:
  border_width: 3
  border_color: #1A5276
  background_color: #EBF5FB
  padding: [6, 12, 6, 12]
  column_rule_width: 0

table:
  background_color: #FFFFFF
  border_color: #D5D8DC
  border_width: 0.5
  cell_padding: [4, 8, 4, 8]
  head:
    background_color: #1A5276
    font_color: #FFFFFF
    font_style: bold
  foot:
    background_color: #EBF5FB
  odd_row_background_color: #F8F9FA
  even_row_background_color: #FFFFFF

sidebar:
  background_color: #EBF5FB
  border_color: #1A5276
  border_width: 1

header:
  font_size: 8
  font_color: #7F8C8D
  border_width: 0.5
  border_color: #BDC3C7
  height: 15mm
  padding: [3, 0, 3, 0]

footer:
  font_size: 8
  font_color: #7F8C8D
  border_width: 0.5
  border_color: #BDC3C7
  height: 12mm
  padding: [3, 0, 3, 0]
  recto:
    right:
      content: '{page-number}'
  verso:
    left:
      content: '{page-number}'
