syntax = "proto3";

package io.github.icesoft.catalog.infrastructure.api.grpc;

option java_multiple_files = true;
option java_package = "io.github.icesoft.catalog.infrastructure.api.grpc";

message ProblemDetail {
  string type = 1;
  string title = 2;
  int32 status = 3;
  string detail = 4;
  string instance = 5;
}

message PageResult {
  int32 page = 1;
  int32 size = 2;
  int64 total_items = 3;
}

