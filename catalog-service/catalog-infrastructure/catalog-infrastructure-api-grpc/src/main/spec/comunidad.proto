syntax = "proto3";

package io.github.icesoft.catalog.infrastructure.api.grpc;

option java_multiple_files = true;
option java_package = "io.github.icesoft.catalog.infrastructure.api.grpc";

import "resumenes.proto";

message ComunidadDetalle {
  string id = 1;
  string nombre = 2;
  string rcp = 3;
  string dir2 = 4;
  repeated ProvinciaResumen provincias = 5;
}

message ListComunidadesRequest {
  string lang = 1;
}

message ListComunidadesResponse {
  repeated ComunidadResumen items = 1;
}

message GetComunidadByIdRequest {
  string id = 1;
  string lang = 2;
}

service ComunidadService {
  rpc ListComunidades(ListComunidadesRequest) returns (ListComunidadesResponse);
  rpc GetComunidadById(GetComunidadByIdRequest) returns (ComunidadDetalle);
}
