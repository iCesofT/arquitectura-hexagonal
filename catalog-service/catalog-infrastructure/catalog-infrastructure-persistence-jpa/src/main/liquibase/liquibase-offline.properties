# Liquibase Configuration for SQL Generation Only
# Este archivo permite generar scripts SQL sin conectarse a ninguna base de datos

# URL ficticia - no se requiere conexión real para updateSQL
url=offline:postgresql?version=13&productName=PostgreSQL

# Credenciales ficticias - no se usan en modo offline
username=dummy
password=dummy

# Driver de PostgreSQL
driver=org.postgresql.Driver

# Configuración adicional
logLevel=INFO
verbose=true


# Contextos específicos
contexts=
