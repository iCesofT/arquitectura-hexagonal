# =====================================================================
# Configuración para tests de integración con H2 en modo PostgreSQL
# H2 simula PostgreSQL para mantener compatibilidad con las queries y esquemas
# =====================================================================
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
  liquibase:
    change-log: classpath:db.changelog-master.xml
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  cache:
    type: none
  # Excluir autoconfiguraciones de Redis: no está disponible en tests de persistencia
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

logging:
  level:
    liquibase: DEBUG
    org.hibernate: DEBUG
    org.springframework.bridge.org.hibernate: DEBUG
