# Cucumber Test Configuration Properties

# Habilitar tests de Cucumber
cucumber.enabled=true

# Lenguaje por defecto para features
cucumber.language=en

# Plugin de salida
cucumber.plugin=pretty
# Otras opciones: json:target/cucumber.json, html:target/cucumber.html, junit:target/cucumber.xml

# Modo strict (fallar si hay pasos undefined)
cucumber.strict=true

# Formato de salida por defecto
cucumber.format=pretty

# Habilitar monochrome (para CI/CD)
cucumber.monochrome=false

# Filtro de tags (ejecutar solo ciertos escenarios)
# cucumber.tags=@important

# Numero de threads para ejecuci?n paralela
cucumber.threads=1

# Retry fallidos
cucumber.retry.count=0

# Timeout por escenario (ms)
cucumber.timeout=30000
