services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    mem_limit: 1g
    cpu_count: 2
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://database:5432/catalog
      - DATABASE_USERNAME=catalog
      - DATABASE_PASSWORD=catalog
      - DATASOURCE_MAXIMUM_POOL_SIZE=50
      - DATASOURCE_MINIMUM_IDLE=10
      - DATABASE_CONNECTION_TIMEOUT=5000
      - DATABASE_IDLE_TIMEOUT=600000
      - DATABASE_MAX_LIFETIME=1800000
      - DATABASE_LEAK_DETECTION_THRESHOLD=10000
      - DATABASE_POOL_NAME=CatalogHikariPool-Docker
      - VIRTUAL_THREADS_ENABLED=true
      - JACKSON_BLACKBIRD_ENABLED=true
      - GRPC_SERVER_PORT=9090
      - REDIS_HOST=cache
    depends_on:
      database:
        condition: service_healthy
    networks:
      - catalog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # PostgreSQL Database (default)
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=1GB"
    mem_limit: 2g
    cpu_count: 2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./catalog-infrastructure/catalog-infrastructure-persistence-jpa/target/liquibase/migration.sql:/docker-entrypoint-initdb.d/01-migration.sql:ro
    networks:
      - catalog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  cache:
    image: redis:8.0-alpine
    mem_limit: 1g
    cpu_count: 2
    ports:
      - "6379:6379"
    networks:
      - catalog-network
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  catalog-network:
    driver: bridge